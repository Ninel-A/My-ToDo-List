<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Organiza tus Cosas por Hacer">
    <meta name="author" content="Ninel">
    <title>Organiza tus cosas por hacer</title>
    <link rel="icon" type="image/x-icon" href="imagen/iconfav.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>📋 To Do List — Organiza tus cosas por hacer</header>

<div class="layout">

    <aside class="sidebar">
        <h2>✦ New Task</h2>

        <div class="campo">
            <label for="descripcion">Descripción</label>
            <input type="text" class="ent-dat" id="descripcion" placeholder="Escribe la tarea...">
        </div>

        <div class="campo">
            <label for="fecha">Fecha</label>
            <input type="date" class="ent-dat" id="fecha">
        </div>

        <button class="btn-primario" onclick="guardarNuevo()">Guardar tarea</button>
    </aside>

    <main class="main">
        <h2>Estos son tus pendientes</h2>

        <table id="tabla-tareas">
            <thead>
                <tr>
                    <th>Descripción</th>
                    <th>Fecha</th>
                    <th style="text-align:center;">Terminada</th>
                    <th style="text-align:center;">Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                
            </tbody>
        </table>
    </main>

</div>

<script>
    const STORAGE_KEY = "tareas";

    
    function cargarTareas() {
        const datos = localStorage.getItem(STORAGE_KEY);
        return datos ? JSON.parse(datos) : [];
    }

    
    function guardarTareas(tareas) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(tareas));
    }

   
    function renderizarTabla() {
        const tbody = document.getElementById('cuerpo-tabla');
        tbody.innerHTML = '';
        cargarTareas().forEach((tarea, i) => agregarFila(tarea, i));
    }

   
    function agregarFila(tarea, indice) {
        const tbody = document.getElementById('cuerpo-tabla');
        const fila = document.createElement('tr');
        fila.dataset.indice = indice; 

        fila.innerHTML = `
            <td class="celda-desc">${tarea.descripcion}</td>
            <td class="celda-fecha">${tarea.fecha}</td>
            <td class="done-cell">
                <input type="checkbox" class="done-checkbox"
                    ${tarea.terminada ? 'checked' : ''}
                    onchange="actualizarEstado(this, ${indice})">
                <span class="status-badge">${tarea.terminada ? 'Terminada' : 'Pendiente'}</span>
            </td>
            <td class="acciones-cell">
                <button class="btn-editar"   onclick="activarEdicion(this, ${indice})" title="Editar">✏️</button>
                <button class="btn-eliminar" onclick="eliminarTarea(${indice})"        title="Eliminar">🗑️</button>
            </td>
        `;
        tbody.appendChild(fila);
    }

   
    function activarEdicion(boton, indice) {
        const fila = boton.closest('tr');
        const tareas = cargarTareas();
        const tarea  = tareas[indice];

        
        const [dd, mm, yyyy] = tarea.fecha.split('/');
        const fechaISO = `${yyyy}-${mm}-${dd}`;

        fila.querySelector('.celda-desc').innerHTML =
            `<input type="text"  class="input-inline" id="ie-desc-${indice}"  value="${tarea.descripcion}">`;

        fila.querySelector('.celda-fecha').innerHTML =
            `<input type="date" class="input-inline" id="ie-fecha-${indice}" value="${fechaISO}">`;

        
        fila.querySelector('.acciones-cell').innerHTML = `
            <button class="btn-confirmar" onclick="confirmarEdicion(this, ${indice})" title="Confirmar">✅</button>
            <button class="btn-cancelar-inline" onclick="renderizarTabla()"           title="Cancelar">✖️</button>
        `;

       
        document.getElementById(`ie-desc-${indice}`).focus();
    }

    function confirmarEdicion(boton, indice) {
        const desc  = document.getElementById(`ie-desc-${indice}`).value.trim();
        const fecha = document.getElementById(`ie-fecha-${indice}`).value;

        if (!desc) {
            alert('La descripción no puede estar vacía.');
            return;
        }


        const [yyyy, mm, dd] = fecha.split('-');
        const fechaFormateada = `${dd}/${mm}/${yyyy}`;

        const tareas = cargarTareas();
        tareas[indice].descripcion = desc;
        tareas[indice].fecha       = fechaFormateada;
        guardarTareas(tareas);

        renderizarTabla(); 
    }

    
     function fechaHoy() {
        const hoy = new Date();
        const yyyy = hoy.getFullYear();
        const mm   = String(hoy.getMonth() + 1).padStart(2, '0'); 
        const dd   = String(hoy.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
    }

    window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('fecha').value = fechaHoy();
    renderizarTabla();
});

    function guardarNuevo() {
        const desc  = document.getElementById('descripcion').value.trim();
        const fecha = document.getElementById('fecha').value;

        if (!desc) {
            alert('Por favor escribe una descripción para la tarea.');
            return;
        }

        const [yyyy, mm, dd] = fecha.split('-');

        const nuevaTarea = {
            descripcion: desc,
            fecha: `${dd}/${mm}/${yyyy}`,
            terminada: false
        };

        const tareas = cargarTareas();
        tareas.push(nuevaTarea);
        guardarTareas(tareas);
        renderizarTabla();

        document.getElementById('descripcion').value = '';
        document.getElementById('fecha').value = fechaHoy();
    }

    function actualizarEstado(checkbox, indice) {
        checkbox.nextElementSibling.textContent = checkbox.checked ? 'Terminada' : 'Pendiente';
        const tareas = cargarTareas();
        tareas[indice].terminada = checkbox.checked;
        guardarTareas(tareas);
    }

    function eliminarTarea(indice) {
        
        const tareas = cargarTareas();
        tareas.splice(indice, 1);
        guardarTareas(tareas);
        renderizarTabla();
    }
</script>

</body>
</html>
